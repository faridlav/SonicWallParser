name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Windows x64
        run: dotnet publish SonicWallParser/SonicWallParser.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o out/win-x64

      - name: Publish Linux x64
        run: dotnet publish SonicWallParser/SonicWallParser.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o out/linux-x64

      - name: Zip artifacts
        run: |
          cd out/win-x64 && zip -j ../../SonicWallParser-win-x64.zip SonicWallParser.exe && cd ../..
          cd out/linux-x64 && zip -j ../../SonicWallParser-linux-x64.zip SonicWallParser && cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            SonicWallParser-win-x64.zip
            SonicWallParser-linux-x64.zip
